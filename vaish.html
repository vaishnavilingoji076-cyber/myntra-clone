<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women Collection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.navbar{
    background:#fff;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    color:#ff3f6c;
    font-weight:bold;
    font-size:28px;
}

.card img{
    height:350px;
    object-fit:cover;
}

.card{
    height:100%;
}

.card-title{
    font-size:22px;
}

.container{
    margin-top:30px;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
<div class="container">

    <a class="navbar-brand logo" href="#">mYnTrA</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="#">Men</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Women</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Kids</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Home & Living</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Beauty</a></li>
        </ul>

        <!-- Search -->
        <div class="d-flex">
            <input
                type="text"
                id="searchInput"
                class="form-control me-2"
                placeholder="Search products..."
                onkeyup="searchProducts()"
            >

            <button
                class="btn btn-outline-danger"
                onclick="searchProducts()"
            >
                Search
            </button>
        </div>

    </div>
</div>
</nav>

<!-- Products -->
<div class="container">

    <h1 class="mb-4">Women Collection</h1>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-md-3 product-card">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="product-name">Korean Dress</h5>
                    <p>₹1299</p>
                    <button class="btn btn-danger">Add to Bag</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3 product-card">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="product-name">Stylish Dress For Women</h5>
                    <p>₹1399</p>
                    <button class="btn btn-danger">Add to Bag</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3 product-card">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="product-name">Modeling Dress</h5>
                    <p>₹2299</p>
                    <button class="btn btn-danger">Add to Bag</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3 product-card">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=500" class="card-img-top">

                <div class="card-body">
                    <h5 class="product-name">Trendy Dress</h5>
                    <p>₹7299</p>
                    <button class="btn btn-danger">Add to Bag</button>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
function searchProducts() {

    let input =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    let products =
        document.querySelectorAll(".product-card");

    products.forEach(product => {

        let name =
            product.querySelector(".product-name")
            .textContent
            .toLowerCase();

        if(name.includes(input)) {
            product.style.display = "block";
        } else {
            product.style.display = "none";
        }

    });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
